name: commerce_mobile
description: "E-commerce project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.3
  go_router: ^16.1.0
  dartz: ^0.10.1
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  zoom_tap_animation: ^1.1.0
  svg_flutter: ^0.0.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  image_cropper: ^9.1.0
  flutter_svg: ^2.2.0
  url_launcher: ^6.3.2
  share_plus: ^11.1.0
  pinput: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/videos/
    - assets/fonts/inter/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Black.ttf
        - asset: assets/fonts/inter/Inter_18pt-BlackItalic.ttf
