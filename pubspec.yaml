name: commerce_mobile
description: "E-commerce project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+6

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.3
  go_router: ^16.1.0
  dartz: ^0.10.1
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  zoom_tap_animation: ^1.1.0
  svg_flutter: ^0.0.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  image_cropper: ^9.1.0
  flutter_svg: ^2.2.0
  url_launcher: ^6.3.2
  share_plus: ^11.1.0
  pinput: ^5.0.1
  country_picker: ^2.0.27
  mask_text_input_formatter: ^2.9.0
  get_it: ^8.2.0
  flutter_bloc: ^9.0.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  uuid: ^4.5.1
  top_snackbar: ^0.0.6
  top_snackbar_flutter: ^3.3.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.1
  flutter_widget_from_html: ^0.17.1
  dotted_line: ^3.2.3
  tosspayments_widget_sdk_flutter: ^2.1.2
  kakao_map_plugin: ^0.3.7
  kakao_flutter_sdk: ^1.9.7+3
  geolocator: ^14.0.1
  search_choices: ^2.3.1
  file_picker: ^10.3.3
  http_parser: ^4.1.2
  flutter_alice: ^2.0.1
  overlay_support: ^2.1.0
  flutter_dotenv: ^6.0.0
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  freezed: ^2.5.8
  build_runner: ^2.4.14
  json_serializable: ^6.8.0

flutter:

  uses-material-design: true

